name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: make lint
      - name: Tests
        run: make test
      - name: Compile smoke
        run: python -m compileall app alembic tests
      - name: Import smoke
        run: python -c "from app.main import app; print(app.title)"
