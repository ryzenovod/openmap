services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: openmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmap"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENMAP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/openmap
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      sh -eu -c "python -m app.scripts.wait_for_db; alembic upgrade head; exec uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_ROLE: viewer
      VITE_LEGACY_TILE_URL: http://localhost:8081/tiles/{z}/{x}/{y}.png
      VITE_MAP_GEOMETRY_ENABLED: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pg_data:
  frontend_node_modules:
