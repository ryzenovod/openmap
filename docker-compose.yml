services:
  db:
    image: postgis/postgis:16-3.4
    container_name: openmap-db
    environment:
      POSTGRES_DB: openmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmap"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmap-api
    environment:
      OPENMAP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/openmap
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pg_data:
