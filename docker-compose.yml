services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: openmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmap"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENMAP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/openmap
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: |
      sh -c '
      python - <<"PY"
      import socket
      import sys
      import time

      for i in range(60):
          try:
              socket.gethostbyname("db")
              break
          except Exception as exc:
              print(f"[wait-dns] db not resolvable yet ({exc}), retry {i+1}/60")
              time.sleep(1)
      else:
          sys.exit("db DNS resolution failed after 60s")
      PY

      python - <<"PY"
      import sys
      import time

      import psycopg

      for i in range(60):
          try:
              with psycopg.connect(
                  "postgresql://postgres:postgres@db:5432/openmap",
                  connect_timeout=2,
              ):
                  break
          except Exception as exc:
              print(f"[wait-db] db is not ready yet ({exc}), retry {i+1}/60")
              time.sleep(1)
      else:
          sys.exit("db connection failed after 60s")
      PY

      alembic upgrade head
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      '

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_ROLE: viewer
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pg_data:
  frontend_node_modules:
