services:
  frontend:
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_ROLE: viewer
      VITE_MAP_GEOMETRY_ENABLED: "true"
      VITE_LEGACY_TILE_URL: http://localhost:8081/tiles/{z}/{x}/{y}.png

  tiles:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - type: bind
        source: ${LEGACY_TILES_DIR:?set LEGACY_TILES_DIR to local legacy tiles directory}
        target: /usr/share/nginx/html/tiles
        read_only: true